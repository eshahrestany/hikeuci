services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    expose:
      - "8000"
    volumes:
      - /data/coolify/applications/backend-prod-static:/python-docker/static
    restart: unless-stopped
    networks:
      - coolify
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  db-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file: .env
    command: ["flask", "db", "upgrade"]
    restart: "no"
    networks:
      - coolify

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile-celery
    env_file: .env
    restart: unless-stopped
    networks:
      - coolify

  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile-celery-beat
    env_file: .env
    restart: unless-stopped
    networks:
      - coolify

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - coolify
    depends_on:
      - backend

networks:
  coolify:
    external: true
